<div class="hero">
  <div class="container">
    <div class="hero-avatar"></div>
    <h1>Hi, 我是 {{ .Site.Params.author }}</h1>
    <p class="hero-desc">{{ .Site.Params.description }}</p>
    <div class="hero-tags">
      {{ range .Site.Taxonomies.tags }}
      <a href="{{ .Page.RelPermalink }}" class="tag">#{{ .Page.Title }}</a>
      {{ end }}
    </div>
  </div>
</div>
